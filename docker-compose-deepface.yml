version: '3.8'

services:
  deepface-api:
    build: .
    image: deepface-gpu:latest
    container_name: deepface-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - DEEPFACE_CONNECTION_DETAILS=postgresql://deepface_user:deepface_pass@pgvector:5432/deepface
      - TF_JIT_DISABLE=1
      - TF_XLA_FLAGS=--tf_xla_auto_jit=0
      - TF_ENABLE_ONEDNN_OPTS=0
      - NVIDIA_VISIBLE_DEVICES=all
      - TF_FORCE_GPU_ALLOW_GROWTH=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      - pgvector

  pgvector:
    image: pgvector/pgvector:pg15
    container_name: deepface-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_DB: deepface
      POSTGRES_USER: deepface_user
      POSTGRES_PASSWORD: deepface_pass
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./pgvector-init:/docker-entrypoint-initdb.d

volumes:
  postgres_data:
