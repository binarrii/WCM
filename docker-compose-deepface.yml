version: '3.8'

services:
  deepface-nginx:
    image: nginx:alpine
    container_name: deepface-nginx
    ports:
      - "5000:5000"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - deepface-api
    restart: unless-stopped

  deepface-api:
    build: .
    image: deepface-gpu:latest
    restart: unless-stopped
    environment:
      - DEEPFACE_CONNECTION_DETAILS=postgresql://deepface_user:deepface_pass@pgvector:5432/deepface
      - TF_JIT_DISABLE=1
      - TF_XLA_FLAGS=--tf_xla_auto_jit=0
      - TF_ENABLE_ONEDNN_OPTS=0
      - NVIDIA_VISIBLE_DEVICES=all
      - TF_FORCE_GPU_ALLOW_GROWTH=true
      - CUDA_MPS_PIPE_DIRECTORY=/tmp/nvidia-mps
      - CUDA_MPS_PINNED_DEVICE_MEM_LIMIT=0.25
    ipc: host
    volumes:
      - /tmp/nvidia-mps:/tmp/nvidia-mps
    deploy:
      mode: replicated
      replicas: 2
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      - pgvector

  pgvector:
    image: pgvector/pgvector:pg15
    container_name: deepface-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_DB: deepface
      POSTGRES_USER: deepface_user
      POSTGRES_PASSWORD: deepface_pass
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./pgvector-init:/docker-entrypoint-initdb.d

volumes:
  postgres_data:
